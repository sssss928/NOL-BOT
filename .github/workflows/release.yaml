name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, example: v0.2.0"
        required: true
        default: "v0.2.0"
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Build source archives
        run: |
          mkdir -p release-assets
          git archive --format=zip --output=release-assets/nol-ticket-bot-source.zip HEAD
          git archive --format=tar.gz --output=release-assets/nol-ticket-bot-source.tar.gz HEAD

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*
            release-assets/*
          generate_release_notes: true
